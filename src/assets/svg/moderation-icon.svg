<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #667eea; stop-opacity: 1" />
      <stop offset="100%" style="stop-color: #764ba2; stop-opacity: 1" />
    </linearGradient>

    <linearGradient id="eyeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #60a5fa; stop-opacity: 1" />
      <stop offset="100%" style="stop-color: #3b82f6; stop-opacity: 1" />
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- 背景装饰圆环 -->
  <g opacity="0.15">
    <circle cx="200" cy="200" r="180" fill="none" stroke="white" stroke-width="1">
      <animate attributeName="r" values="180;185;180" dur="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.15;0.3;0.15" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="200" cy="200" r="160" fill="none" stroke="white" stroke-width="1">
      <animate attributeName="r" values="160;165;160" dur="3s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.15;0.25;0.15" dur="3s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- 主盾牌图标 -->
  <g filter="url(#shadow)">
    <path
      d="M200,60 L280,90 C280,90 285,95 285,110 L285,200 C285,260 240,300 200,330 C160,300 115,260 115,200 L115,110 C115,95 120,90 120,90 L200,60 Z"
      fill="url(#shieldGradient)"
      stroke="white"
      stroke-width="3"
      opacity="0.95"
    />

    <path
      d="M200,60 L280,90 C280,90 285,95 285,110 L285,150 C285,150 240,130 200,120 C160,130 115,150 115,150 L115,110 C115,95 120,90 120,90 L200,60 Z"
      fill="white"
      opacity="0.2"
    />
  </g>

  <!-- 审核眼睛图标 -->
  <g filter="url(#glow)">
    <ellipse
      cx="200"
      cy="180"
      rx="50"
      ry="30"
      fill="none"
      stroke="url(#eyeGradient)"
      stroke-width="4"
    />

    <circle cx="200" cy="180" r="15" fill="url(#eyeGradient)">
      <animate attributeName="r" values="15;16;15" dur="3s" repeatCount="indefinite" />
    </circle>

    <circle cx="200" cy="180" r="8" fill="white" opacity="0.9">
      <animate attributeName="r" values="8;9;8" dur="3s" repeatCount="indefinite" />
    </circle>

    <circle cx="205" cy="176" r="3" fill="white" />
  </g>

  <!-- 装饰性扫描线 -->
  <g opacity="0.3">
    <line x1="140" y1="170" x2="260" y2="170" stroke="white" stroke-width="1">
      <animate attributeName="y1" values="160;200;160" dur="3s" repeatCount="indefinite" />
      <animate attributeName="y2" values="160;200;160" dur="3s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.6;0" dur="3s" repeatCount="indefinite" />
    </line>
  </g>

  <!-- 浮动粒子效果 -->
  <g>
    <circle cx="150" cy="150" r="2" fill="white" opacity="0.6">
      <animate attributeName="cy" values="150;130;150" dur="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.8;0" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="250" cy="140" r="2" fill="white" opacity="0.6">
      <animate attributeName="cy" values="140;120;140" dur="3.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.8;0" dur="3.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="180" cy="280" r="2" fill="white" opacity="0.6">
      <animate attributeName="cy" values="280;260;280" dur="3s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.8;0" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="220" cy="290" r="2" fill="white" opacity="0.6">
      <animate attributeName="cy" values="290;270;290" dur="3.8s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.8;0" dur="3.8s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- 浮动动画 -->
  <animateTransform
    attributeName="transform"
    attributeType="XML"
    type="translate"
    values="0 0; 0 -20; 0 0"
    dur="6s"
    repeatCount="indefinite"
  />
</svg>
